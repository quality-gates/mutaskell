name: GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.12.1'
          cabal-version: '3.12.1.0'
      - name: Build Haddock
        run: |
          cabal update
          cabal haddock all --haddock-html --haddock-hyperlinked-source
          mkdir -p docs
          cp -r dist-newstyle/build/*/*/mutaskell-*/doc/html/mutaskell/* docs/ || true
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
