name: Mutation Analysis

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:
  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.8.2'
          cabal-version: '3.10.3.0'
      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: ~/.cabal/store
          key: ${{ runner.os }}-ghc-9.8.2-cabal-${{ hashFiles('MuCheck.cabal') }}
          restore-keys: ${{ runner.os }}-ghc-9.8.2-cabal-
      - name: Build and run test suite
        run: cabal test all --test-show-details=direct --write-ghc-environment-files=always
      - name: Run mutation tests with MSI quality gate
        run: cabal run mucheck -- --min-msi 50 --ignore-msi-with-no-mutations Examples/AssertCheckTest.hs
