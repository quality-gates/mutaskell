name: Mutation Analysis

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:
  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.8.2'
          cabal-version: '3.10.3.0'
      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: ~/.cabal/store
          key: ${{ runner.os }}-ghc-9.8.2-cabal-${{ hashFiles('MuCheck.cabal') }}
          restore-keys: ${{ runner.os }}-ghc-9.8.2-cabal-
      - name: Build all targets (writes .ghc.environment.* for hint)
        run: cabal build --write-ghc-environment-files=always all
      - name: Run test suite
        run: cabal test all --test-show-details=direct
      - name: Run sample-test with coverage (MuCheck package only)
        run: |
          echo "package MuCheck" > cabal.project.local
          echo "  coverage: True" >> cabal.project.local
          cabal run exe:sample-test
          rm -f cabal.project.local
          mkdir -p .hpc
          # Find all .mix files and flatten them into .hpc/
          find dist-newstyle -name "*.mix" -exec cp {} .hpc/ \;
      - name: Run mutation tests with MSI and covered-MSI quality gates
        run: cabal run mucheck -- --min-msi 50 --min-covered-msi 50 --ignore-msi-with-no-mutations --tix sample-test.tix Examples/AssertCheckTest.hs
